<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Interaktif Pertamaku</title>
    <style>
        /* --- STYLE CSS (Biar Tampilan Keren) --- */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #74ebe1 0%, #d4a5ec 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
        }

        .container {
            background-color: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        h1 {
            color: #333;
            margin-bottom: 20px;
        }

        .input-box {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        input {
            flex: 1;
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 8px;
            outline: none;
            font-size: 16px;
        }

        input:focus {
            border-color: #a55eea;
        }

        button {
            padding: 10px 20px;
            background-color: #a55eea;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }

        button:hover {
            background-color: #8843d0;
        }

        ul {
            list-style: none;
            padding: 0;
            margin: 0;
            text-align: left;
        }

        li {
            background: #f9f9f9;
            padding: 12px;
            margin-bottom: 8px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 5px solid #a55eea;
            animation: fadeIn 0.3s ease;
        }

        .delete-btn {
            background-color: #ff5252;
            padding: 5px 10px;
            font-size: 12px;
        }

        .delete-btn:hover {
            background-color: #b33939;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Sebut Tugasmu!</h1>
        <div class="input-box">
            <input type="text" id="taskInput" placeholder="Ketik rencana hari ini...">
            <button onclick="tambahTugas()">Tambah</button>
        </div>
        <ul id="taskList"></ul>
    </div>

    <script>
        function tambahTugas() {
            const input = document.getElementById('taskInput');
            const taskText = input.value.trim();

            if (taskText === '') {
                alert('Isi tugasnya dulu dong!');
                return;
            }

            const ul = document.getElementById('taskList');
            
            // Membuat elemen daftar baru (li)
            const li = document.createElement('li');
            li.innerHTML = `
                <span>${taskText}</span>
                <button class="delete-btn" onclick="hapusTugas(this)">Hapus</button>
            `;

            // Masukkan ke dalam list
            ul.appendChild(li);

            // Kosongkan input kembali
            input.value = '';
        }

        function hapusTugas(button) {
            // Menghapus elemen li saat tombol hapus diklik
            const li = button.parentElement;
            li.remove();
        }
    </script>
</body>
</html>
