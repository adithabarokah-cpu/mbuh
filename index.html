<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Interaktif Pertamaku</title>
    <style>
        /* --- STYLE CSS --- */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #74ebe1 0%, #d4a5ec 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            transition: background 0.5s ease;
        }

        /* Tema Merah Rahasia */
        body.mode-rahasia {
            background: linear-gradient(135deg, #2c0000 0%, #8b0000 100%);
        }

        .container {
            background-color: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
            transition: all 0.5s ease;
        }

        .container.mode-rahasia {
            background-color: #1a1a1a;
            color: #ff5252;
            box-shadow: 0 10px 30px rgba(255, 0, 0, 0.3);
        }

        h1 {
            color: #333;
            margin-bottom: 20px;
            transition: color 0.5s ease;
        }

        .mode-rahasia h1 {
            color: #ff5252;
            text-shadow: 0 0 10px rgba(255, 82, 82, 0.5);
        }

        .input-box {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        input {
            flex: 1;
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 8px;
            outline: none;
            font-size: 16px;
            background: white;
            color: #333;
        }

        .mode-rahasia input {
            background: #2a2a2a;
            border-color: #ff5252;
            color: white;
        }

        button {
            padding: 10px 20px;
            background-color: #a55eea;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }

        button:hover {
            background-color: #8843d0;
        }

        .mode-rahasia button {
            background-color: #ff5252;
        }

        .mode-rahasia button:hover {
            background-color: #b33939;
        }

        ul {
            list-style: none;
            padding: 0;
            margin: 0;
            text-align: left;
        }

        li {
            background: #f9f9f9;
            padding: 12px;
            margin-bottom: 8px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 5px solid #a55eea;
            animation: fadeIn 0.3s ease;
        }

        .mode-rahasia li {
            background: #222;
            color: white;
            border-left-color: #ff5252;
        }

        .delete-btn {
            background-color: #ff5252;
            padding: 5px 10px;
            font-size: 12px;
        }

        .delete-btn:hover {
            background-color: #b33939;
        }

        /* Area Menu Rahasia */
        .menu-rahasia {
            display: none;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 2px dashed #ff5252;
            animation: fadeIn 0.5s ease;
        }

        .btn-rahasia {
            background-color: #3a0000;
            color: #ff5252;
            border: 1px solid #ff5252;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
        }

        .btn-rahasia:hover {
            background-color: #ff5252;
            color: white;
            box-shadow: 0 0 15px rgba(255, 82, 82, 0.6);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="container" id="mainContainer">
        <h1 id="webTitle">Sebut Tugasmu!</h1>
        <div class="input-box">
            <input type="text" id="taskInput" placeholder="Ketik rencana hari ini...">
            <button onclick="tambahTugas()">Tambah</button>
        </div>
        <ul id="taskList"></ul>

        <div class="menu-rahasia" id="secretMenu">
            <button class="btn-rahasia" onclick="jalankanPesanRahasiaAdit()">Pesan Rahasia</button>
            
            <button class="btn-rahasia" onclick="alert('Membuka brankas simpenanku...')">Simpenanku</button>
            <button class="btn-rahasia" onclick="alert('Mau tau aja atau mau tau banget?')">Adadeh</button>
            <button class="btn-rahasia" onclick="alert('Menampilkan surat wasiat...')">Surat Wasiat</button>
            <button class="btn-rahasia" onclick="jalankanPesanRahasiaAdit()">Pesan Rahasia</button>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', muatTugas);
        // ==========================================
        //  TEMPAT UNTUK KODE BIKINAN ADIT SENDIRI
        // ==========================================
        function jalankanPesanRahasiaAdit() {
    // Mengarahkan halaman langsung ke file pesan rahasia buatanmu
    window.location.href = "pesan.html";
}
            // Taruh kode JavaScript kamu di bawah sini!
            // Contoh default:

    function jalankanPesanRahasiaAdit() {
    // Menyembunyikan tampilan utama biar halaman buatanmu kelihatan
    document.getElementById('mainContainer').style.display = 'none';
    
    // Langsung menjalankan sequence loading animasi buatanmu
    runLoadingSequence();
}
        // ==========================================

        function tambahTugas() {
            const input = document.getElementById('taskInput');
            const taskText = input.value.trim();

            if (taskText.toUpperCase() === 'RHS') {
                aktifkanModeRahasia();
                input.value = '';
                return;
            }

            if (taskText === '') {
                alert('Isi tugasnya dulu dong!');
                return;
            }

            buatElemenTugas(taskText);
            simpanKeSimpanan();
            input.value = '';
        }

        function aktifkanModeRahasia() {
            document.body.classList.add('mode-rahasia');
            document.getElementById('mainContainer').classList.add('mode-rahasia');
            document.getElementById('webTitle').innerText = "RUANGAN RAHASIA";
            document.getElementById('secretMenu').style.display = 'grid';
            alert('Akses diterima. Selamat datang di Ruangan Rahasia!');
        }

        function buatElemenTugas(taskText) {
            const ul = document.getElementById('taskList');
            const li = document.createElement('li');
            li.innerHTML = `
                <span>${taskText}</span>
                <button class="delete-btn" onclick="hapusTugas(this)">Hapus</button>
            `;
            ul.appendChild(li);
        }

        function hapusTugas(button) {
            const li = button.parentElement;
            li.remove();
            simpanKeSimpanan();
        }

        function simpanKeSimpanan() {
            const ul = document.getElementById('taskList');
            const tugasArray = [];
            ul.querySelectorAll('li span').forEach(span => {
                tugasArray.push(span.innerText);
            });
            localStorage.setItem('daftarTugasAdit', JSON.stringify(tugasArray));
        }

        function muatTugas() {
            const tugasTersimpan = localStorage.getItem('daftarTugasAdit');
            if (tugasTersimpan) {
                const tugasArray = JSON.parse(tugasTersimpan);
                tugasArray.forEach(tugas => {
                    buatElemenTugas(tugas);
                });
            }
        }
    </script>
</body>
</html>
